services:
  pi-agent-runtime:
    build:
      context: ./pi-agent-runtime
    image: review-orchestrator-pi-agent:0.80.7
    environment:
      PI_AGENT_STATE_ROOT: /var/lib/pi-agent
      PI_AGENT_WORKSPACE_ROOT: /var/lib/review-orchestrator/workspaces
      PI_AGENT_SKILLS_ROOT: /opt/pi-agent/skills
      PI_AGENT_MODELS_FILE: /etc/pi-agent/models.json
      PI_AGENT_RUNTIME_TOKEN: ${PI_AGENT_RUNTIME_TOKEN:-}
      PI_AGENT_PROVIDER: ${PI_AGENT_PROVIDER:-openai}
      PI_AGENT_MODEL: ${PI_AGENT_MODEL:-gpt-5.4}
      PI_AGENT_THINKING_LEVEL: ${PI_AGENT_THINKING_LEVEL:-high}
      PI_AGENT_REVIEW_SKILL: ${PI_AGENT_REVIEW_SKILL:-code-review}
      PI_AGENT_REVIEW_PROFILE: ${PI_AGENT_REVIEW_PROFILE:-default}
      PI_AGENT_MODEL_BASE_URL: ${PI_AGENT_MODEL_BASE_URL:-}
      PI_AGENT_LLM_API_KEY: ${PI_AGENT_LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "127.0.0.1:${PI_AGENT_RUNTIME_PORT:-3210}:3210"
    volumes:
      - pi_agent_state:/var/lib/pi-agent
      - review_orchestrator_data:/var/lib/review-orchestrator:ro
      - ${PI_AGENT_SKILLS_PATH:-./pi-agent-runtime/skills}:/opt/pi-agent/skills:ro
      - ${PI_AGENT_CONFIG_PATH:-./pi-agent-runtime/config}:/etc/pi-agent:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    restart: unless-stopped

  review-orchestrator:
    build:
      context: .
    image: review-orchestrator:local
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////var/lib/review-orchestrator/review_orchestrator.db}
      HOST: 0.0.0.0
      PORT: 8000
      WORKSPACE_ROOT: /var/lib/review-orchestrator/workspaces
      GIT_CACHE_ROOT: /var/lib/review-orchestrator/git-cache
      PI_AGENT_BASE_URL: http://pi-agent-runtime:3210
      PI_AGENT_RUNTIME_TOKEN: ${PI_AGENT_RUNTIME_TOKEN:-}
      PI_AGENT_PROVIDER: ${PI_AGENT_PROVIDER:-openai}
      PI_AGENT_MODEL: ${PI_AGENT_MODEL:-gpt-5.4}
      PI_AGENT_THINKING_LEVEL: ${PI_AGENT_THINKING_LEVEL:-high}
      PI_AGENT_MODEL_BASE_URL: ${PI_AGENT_MODEL_BASE_URL:-}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - review_orchestrator_data:/var/lib/review-orchestrator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - pi-agent-runtime
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pi_agent_state:
  review_orchestrator_data:
