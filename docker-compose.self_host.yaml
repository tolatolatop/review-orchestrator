services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-review_orchestrator}
      POSTGRES_USER: ${POSTGRES_USER:-review}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-review}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  openhands:
    image: ${OPENHANDS_IMAGE:-docker.openhands.dev/openhands/openhands:1.8}
    env_file:
      - path: .env
        required: false
    environment:
      SANDBOX_RUNTIME_CONTAINER_IMAGE: ${SANDBOX_RUNTIME_CONTAINER_IMAGE:-docker.all-hands.dev/all-hands-ai/runtime:latest}
      SANDBOX_HOST_PORT: ${SANDBOX_HOST_PORT:-${OPENHANDS_FRONTEND_PORT:-${OPENHANDS_PORT:-3000}}}
      LOG_ALL_EVENTS: ${OPENHANDS_LOG_ALL_EVENTS:-false}
      OH_WEB_URL: ${OH_WEB_URL:-http://host.docker.internal:${OPENHANDS_FRONTEND_PORT:-${OPENHANDS_PORT:-3000}}}
    ports:
      - "127.0.0.1:${OPENHANDS_FRONTEND_PORT:-${OPENHANDS_PORT:-3000}}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands_state:/.openhands-state
      - review_orchestrator_data:/var/lib/review-orchestrator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  review-orchestrator:
    build:
      context: .
    image: review-orchestrator:self-host
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-self_host}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-review}:${POSTGRES_PASSWORD:-review}@postgres:5432/${POSTGRES_DB:-review_orchestrator}
      HOST: 0.0.0.0
      PORT: 8000
      WORKSPACE_ROOT: /var/lib/review-orchestrator/workspaces
      GIT_CACHE_ROOT: /var/lib/review-orchestrator/git-cache
      OPENHANDS_BASE_URL: http://openhands:3000
    expose:
      - "8000"
    volumes:
      - review_orchestrator_data:/var/lib/review-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      openhands:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  review-orchestrator-worker:
    build:
      context: .
    image: review-orchestrator:self-host
    command: ["review-orchestrator-worker"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-self_host}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-review}:${POSTGRES_PASSWORD:-review}@postgres:5432/${POSTGRES_DB:-review_orchestrator}
      WORKSPACE_ROOT: /var/lib/review-orchestrator/workspaces
      GIT_CACHE_ROOT: /var/lib/review-orchestrator/git-cache
      OPENHANDS_BASE_URL: http://openhands:3000
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
      WORKER_LOCK_SECONDS: ${WORKER_LOCK_SECONDS:-300}
    volumes:
      - review_orchestrator_data:/var/lib/review-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      openhands:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    environment:
      REVIEW_PROXY_TOKEN: ${REVIEW_PROXY_TOKEN:?REVIEW_PROXY_TOKEN must be set}
    ports:
      - "${REVIEW_PROXY_PORT:-18080}:8080"
    volumes:
      - ./deploy/nginx/review-orchestrator.conf.template:/etc/nginx/templates/review-orchestrator.conf.template:ro
    depends_on:
      review-orchestrator:
        condition: service_healthy
      review-orchestrator-worker:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "-",
          "http://127.0.0.1:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  openhands_state:
  review_orchestrator_data:
