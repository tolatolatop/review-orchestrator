services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-review_orchestrator}
      POSTGRES_USER: ${POSTGRES_USER:-review}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-review}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pi-agent-runtime:
    build:
      context: ./pi-agent-runtime
    image: review-orchestrator-pi-agent:0.80.7
    environment:
      PI_AGENT_HOST: 0.0.0.0
      PI_AGENT_PORT: 3210
      PI_AGENT_STATE_ROOT: /var/lib/pi-agent
      PI_AGENT_TASK_ENVIRONMENT_ROOT: /var/lib/pi-agent-task
      PI_AGENT_WORKSPACE_ROOT: /var/lib/review-orchestrator/workspaces
      PI_AGENT_ENVIRONMENT_TEMPLATE_ROOT: /opt/pi-agent/environment-template
      PI_AGENT_TASK_UID_MIN: 20000
      PI_AGENT_TASK_UID_MAX: 60000
      PI_AGENT_TASK_GID: 65532
      PI_AGENT_WORKSPACE_OWNER_UID: 1000
      PI_AGENT_WORKSPACE_OWNER_GID: 1000
      PI_AGENT_SKILLS_ROOT: /opt/pi-agent/skills
      PI_AGENT_MODELS_FILE: /etc/pi-agent/models.json
      PI_AGENT_RUNTIME_TOKEN: ${PI_AGENT_RUNTIME_TOKEN:-}
      PI_AGENT_PROVIDER: ${PI_AGENT_PROVIDER:-openai}
      PI_AGENT_MODEL: ${PI_AGENT_MODEL:-gpt-5.4}
      PI_AGENT_THINKING_LEVEL: ${PI_AGENT_THINKING_LEVEL:-high}
      PI_AGENT_MODEL_BASE_URL: ${PI_AGENT_MODEL_BASE_URL:-}
      PI_AGENT_LLM_API_KEY: ${PI_AGENT_LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "127.0.0.1:${PI_AGENT_RUNTIME_PORT:-3210}:3210"
    volumes:
      - pi_agent_state:/var/lib/pi-agent
      - review_workspace:/var/lib/review-orchestrator/workspaces
      - ${PI_AGENT_SKILLS_PATH:-./pi-agent-runtime/skills}:/opt/pi-agent/skills:ro
      - ${PI_AGENT_CONFIG_PATH:-./pi-agent-runtime/config}:/etc/pi-agent:ro
      - ${PI_AGENT_ENVIRONMENT_TEMPLATE_PATH:-./pi-agent-runtime/environment-template}:/opt/pi-agent/environment-template:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /var/lib/pi-agent-task:size=1g,mode=0755
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3210/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  review-orchestrator:
    build:
      context: .
    image: review-orchestrator:self-host
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-self_host}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-review}:${POSTGRES_PASSWORD:-review}@postgres:5432/${POSTGRES_DB:-review_orchestrator}
      HOST: 0.0.0.0
      PORT: 8000
      WORKSPACE_ROOT: /var/lib/review-orchestrator/workspaces
      GIT_CACHE_ROOT: /var/lib/review-orchestrator/git-cache
      PI_AGENT_BASE_URL: http://pi-agent-runtime:3210
      PI_AGENT_RUNTIME_TOKEN: ${PI_AGENT_RUNTIME_TOKEN:-}
      PI_AGENT_REVIEW_AGENT: ${PI_AGENT_REVIEW_AGENT:-code-review}
      PI_AGENT_REVIEW_SKILL: ${PI_AGENT_REVIEW_SKILL:-code-review}
      AGENT_COMMAND_AGENT: ${AGENT_COMMAND_AGENT:-pr-assistant}
      AGENT_COMMAND_ENABLED: ${AGENT_COMMAND_ENABLED:-true}
      AGENT_COMMAND_SKILL: ${AGENT_COMMAND_SKILL:-pr-assistant}
      AGENT_TASK_SOFT_TIMEOUT_SECONDS: ${AGENT_TASK_SOFT_TIMEOUT_SECONDS:-120}
      AGENT_TASK_TIMEOUT_SECONDS: ${AGENT_TASK_TIMEOUT_SECONDS:-600}
      AGENT_TASK_MAX_HISTORY_TURNS: ${AGENT_TASK_MAX_HISTORY_TURNS:-6}
      AGENT_TASK_MAX_HISTORY_CHARS: ${AGENT_TASK_MAX_HISTORY_CHARS:-24000}
      AGENT_TASK_ALLOWED_ASSOCIATIONS: ${AGENT_TASK_ALLOWED_ASSOCIATIONS:-OWNER,MEMBER,COLLABORATOR}
      AGENT_TASK_MAX_COMMAND_CHARS: ${AGENT_TASK_MAX_COMMAND_CHARS:-8000}
      PROVIDER_CORE_API_TOKEN: ${PROVIDER_CORE_API_TOKEN:-}
    expose:
      - "8000"
    ports:
      - "127.0.0.1:${REVIEW_LOCAL_PORT:-18000}:8000"
    volumes:
      - review_orchestrator_data:/var/lib/review-orchestrator
      - review_workspace:/var/lib/review-orchestrator/workspaces
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      pi-agent-runtime:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  review-orchestrator-worker:
    build:
      context: .
    image: review-orchestrator:self-host
    command: ["review-orchestrator-worker", "--mode", "execution"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-self_host}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-review}:${POSTGRES_PASSWORD:-review}@postgres:5432/${POSTGRES_DB:-review_orchestrator}
      WORKSPACE_ROOT: /var/lib/review-orchestrator/workspaces
      GIT_CACHE_ROOT: /var/lib/review-orchestrator/git-cache
      PI_AGENT_BASE_URL: http://pi-agent-runtime:3210
      PI_AGENT_RUNTIME_TOKEN: ${PI_AGENT_RUNTIME_TOKEN:-}
      PI_AGENT_REVIEW_AGENT: ${PI_AGENT_REVIEW_AGENT:-code-review}
      PI_AGENT_REVIEW_SKILL: ${PI_AGENT_REVIEW_SKILL:-code-review}
      AGENT_COMMAND_AGENT: ${AGENT_COMMAND_AGENT:-pr-assistant}
      AGENT_COMMAND_ENABLED: ${AGENT_COMMAND_ENABLED:-true}
      AGENT_COMMAND_SKILL: ${AGENT_COMMAND_SKILL:-pr-assistant}
      AGENT_TASK_SOFT_TIMEOUT_SECONDS: ${AGENT_TASK_SOFT_TIMEOUT_SECONDS:-120}
      AGENT_TASK_TIMEOUT_SECONDS: ${AGENT_TASK_TIMEOUT_SECONDS:-600}
      AGENT_TASK_MAX_HISTORY_TURNS: ${AGENT_TASK_MAX_HISTORY_TURNS:-6}
      AGENT_TASK_MAX_HISTORY_CHARS: ${AGENT_TASK_MAX_HISTORY_CHARS:-24000}
      AGENT_TASK_ALLOWED_ASSOCIATIONS: ${AGENT_TASK_ALLOWED_ASSOCIATIONS:-OWNER,MEMBER,COLLABORATOR}
      AGENT_TASK_MAX_COMMAND_CHARS: ${AGENT_TASK_MAX_COMMAND_CHARS:-8000}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
      WORKER_LOCK_SECONDS: ${WORKER_LOCK_SECONDS:-300}
    volumes:
      - review_orchestrator_data:/var/lib/review-orchestrator
      - review_workspace:/var/lib/review-orchestrator/workspaces
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      pi-agent-runtime:
        condition: service_healthy
    restart: unless-stopped

  review-orchestrator-delivery-worker:
    build:
      context: .
    image: review-orchestrator:self-host
    command: ["review-orchestrator-worker", "--mode", "delivery"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-self_host}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-review}:${POSTGRES_PASSWORD:-review}@postgres:5432/${POSTGRES_DB:-review_orchestrator}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
      WORKER_LOCK_SECONDS: ${WORKER_LOCK_SECONDS:-300}
    volumes:
      - review_orchestrator_data:/var/lib/review-orchestrator
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    environment:
      REVIEW_PROXY_TOKEN_ENABLED: "${REVIEW_PROXY_TOKEN_ENABLED:-true}"
      REVIEW_PROXY_TOKEN: "${REVIEW_PROXY_TOKEN:-}"
    ports:
      - "${REVIEW_PROXY_PORT:-18080}:8080"
    volumes:
      - ./deploy/nginx/review-orchestrator.conf.template:/etc/nginx/templates/review-orchestrator.conf.template:ro
    depends_on:
      review-orchestrator:
        condition: service_healthy
      review-orchestrator-worker:
        condition: service_started
      review-orchestrator-delivery-worker:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "-",
          "http://127.0.0.1:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  pi_agent_state:
  review_orchestrator_data:
  review_workspace:
